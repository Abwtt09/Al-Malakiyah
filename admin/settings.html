<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />

  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/i18n.js" />
  <title data-i18n="dashboard.settings">الإعدادات</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>
  <div id="sidebar"></div>

  <main class="dashboard-main">

    <header class="dashboard-header">
      <p class="eyebrow" data-i18n="dashboard.settings"></p>
      <h1 data-i18n="dashboard.settings"></h1>
      <p data-i18n="dashboard.settingsDesc"></p>
    </header>

    <div class="settings-layout">

      <!-- Language -->
      <div class="settings-section" id="sectionLang">
        <div class="settings-section-head">
          <div class="settings-section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
          </div>
          <div>
            <p class="settings-section-title" data-i18n="dashboard.settingsLang"></p>
            <p class="settings-section-desc" data-i18n="common.language"></p>
          </div>
        </div>
        <div class="lang-switcher" id="settingsLangSwitcher"></div>
      </div>

      <!-- Change Password -->
      <div class="settings-section" id="sectionPassword">
        <div class="settings-section-head">
          <div class="settings-section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
          <div>
            <p class="settings-section-title" data-i18n="dashboard.changePassword"></p>
            <p class="settings-section-desc" data-i18n="dashboard.changePasswordDesc"></p>
          </div>
        </div>
        <form id="pwdForm" novalidate>
          <div style="display:flex;flex-direction:column;gap:1rem">
            <div class="field-group">
              <label class="field-label" data-i18n="dashboard.currentPassword"></label>
              <input class="field-input" id="fCurrentPwd" type="password" autocomplete="current-password" />
            </div>
            <div class="field-group">
              <label class="field-label" data-i18n="dashboard.newPassword"></label>
              <input class="field-input" id="fNewPwd" type="password" autocomplete="new-password" />
            </div>
            <div class="field-group">
              <label class="field-label" data-i18n="dashboard.confirmNewPassword"></label>
              <input class="field-input" id="fConfirmPwd" type="password" autocomplete="new-password" />
            </div>
            <p class="field-hint" id="pwdMsg" style="display:none;margin:0"></p>
          </div>
          <div style="margin-top:1.25rem">
            <button type="submit" class="btn btn-primary" id="pwdSaveBtn">
              <span data-i18n="dashboard.saveChanges"></span>
            </button>
          </div>
        </form>
      </div>

      <!-- Sign Out -->
      <div class="settings-section" id="sectionSignout">
        <div class="settings-section-head">
          <div class="settings-section-icon" style="background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.15)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </div>
          <div>
            <p class="settings-section-title" data-i18n="dashboard.signOut"></p>
          </div>
        </div>
        <button class="btn" id="signOutBtn"
          style="background:rgba(192,57,43,0.08);color:#C0392B;border:1px solid rgba(192,57,43,0.2)"
          data-i18n="dashboard.signOut"></button>
      </div>

      <!-- Admin links (only shown to admin_owner / manager) -->
      <div class="settings-section" id="sectionAdmin" style="display:none">
        <div class="settings-section-head">
          <div class="settings-section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </div>
          <div>
            <p class="settings-section-title" data-i18n="dashboard.settingsAdmin"></p>
          </div>
        </div>
        <div class="settings-admin-links">
          <a href="users.html" class="settings-admin-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <span class="settings-admin-link-label" data-i18n="dashboard.settingsUsersLink"></span>
            <span class="settings-admin-link-arrow">›</span>
          </a>

          <a href="databases.html" class="settings-admin-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3" />
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
            </svg>
            <span class="settings-admin-link-label" data-i18n="dashboard.settingsDataLink"></span>
            <span class="settings-admin-link-arrow">›</span>
          </a>

          <a href="logs.html" class="settings-admin-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span class="settings-admin-link-label" data-i18n="dashboard.settingsLogsLink"></span>
            <span class="settings-admin-link-arrow">›</span>
          </a>
        </div>
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script type="module" src="../assets/js/admin/settings.js"></script>
</body>

</html>
