<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="dns-prefetch" href="https://api.cloudinary.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/db.js" />
  <link rel="modulepreload" href="../assets/js/supabase-config.js" />
  <link rel="modulepreload" href="../assets/js/profile-cache.js" />
  <title>إعداد الحساب لأول مرة</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body class="auth-page">
  <!-- Background glowing elements -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="auth-card">
    <div class="logo">
      <img src="../assets/img/logo.png" alt="" class="logo-mark">
      <div class="logo-text">
        <span class="logo-name">الملكية للإستثمار</span>
      </div>
    </div>

    <div class="auth-header">
      <h1>إعداد الحساب للمرة الأولى</h1>
      <p>يرجى تحديث بيانات حسابك وتعيين كلمة المرور الخاصة بك لمتابعة استخدام لوحة التحكم.</p>
    </div>

    <form id="setupForm" style="display: flex; flex-direction: column; gap: 0.5rem;">
      <!-- Full Name field -->
      <div class="field-group">
        <label class="field-label">الاسم الكامل / Full Name</label>
        <input class="field-input" type="text" name="fullName" required placeholder="مثال: أحمد المعمري" />
        <span class="field-hint">الاسم الكامل للموظف ليظهر في سجلات النظام.</span>
      </div>

      <!-- Username field -->
      <div class="field-group">
        <label class="field-label">اسم المستخدم / Username</label>
        <input class="field-input" type="text" name="username" required dir="ltr" autocapitalize="off" autocorrect="off"
          spellcheck="false" placeholder="ahmed_almalakiyah" />
        <span class="field-hint">سيتم استخدامه لتسجيل الدخول لاحقاً.</span>
      </div>

      <!-- Email field -->
      <div class="field-group">
        <label class="field-label">البريد الإلكتروني / Email Address</label>
        <input class="field-input" type="email" name="email" required dir="ltr" placeholder="name@example.com" />
        <span class="field-hint">البريد الإلكتروني الحقيقي الخاص بك لاستلام الإشعارات واستعادة الحساب.</span>
      </div>

      <!-- Password field -->
      <div class="field-group">
        <label class="field-label">كلمة المرور الجديدة / New Password</label>
        <input class="field-input" type="password" name="password" required placeholder="••••••••" minlength="6" />
      </div>

      <!-- Confirm Password field -->
      <div class="field-group">
        <label class="field-label">تأكيد كلمة المرور / Confirm Password</label>
        <input class="field-input" type="password" name="confirmPassword" required placeholder="••••••••"
          minlength="6" />
      </div>

      <p class="field-error hidden" id="setupError"></p>

      <button type="submit" class="btn-primary" id="setupBtn" style="margin-top: 1.5rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span id="setupLabel">حفظ وإكمال الإعداد / Save & Complete Setup</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>الملكية للاستثمار <span class="num" id="year"></span> ©</p>
    </div>
  </div>

  <script type="module" src="../assets/js/admin/setup.js"></script>
</body>

</html>
