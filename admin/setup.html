<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="dns-prefetch" href="https://api.cloudinary.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/db.js" />
  <link rel="modulepreload" href="../assets/js/supabase-config.js" />
  <link rel="modulepreload" href="../assets/js/profile-cache.js" />
  <title>إعداد الحساب لأول مرة</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body class="auth-page">
  <!-- Background glowing elements -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="auth-card">
    <div class="logo">
      <img src="../assets/img/logo.png" alt="" class="logo-mark">
      <div class="logo-text">
        <span class="logo-name">الملكية للإستثمار</span>
      </div>
    </div>

    <div class="auth-header">
      <h1>إعداد الحساب للمرة الأولى</h1>
      <p>يرجى تحديث بيانات حسابك وتعيين كلمة المرور الخاصة بك لمتابعة استخدام لوحة التحكم.</p>
    </div>

    <form id="setupForm" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem 1rem;">
      <!-- Full Name field -->
      <div class="field-group" style="grid-column: span 1;">
        <label class="field-label">الاسم الكامل</label>
        <input class="field-input" type="text" name="fullName" required placeholder="الاسم" style="height:2.625rem; font-size:0.875rem;" />
      </div>
 
      <!-- Username field -->
      <div class="field-group" style="grid-column: span 1;">
        <label class="field-label">اسم المستخدم</label>
        <input class="field-input" type="text" name="username" required dir="ltr" autocapitalize="off" autocorrect="off"
          spellcheck="false" placeholder="name_almalakiya" style="height:2.625rem; font-size:0.875rem;" />
      </div>
 
      <!-- Email field -->
      <div class="field-group" style="grid-column: span 2;">
        <label class="field-label">البريد الإلكتروني</label>
        <input class="field-input" type="email" name="email" required dir="ltr" placeholder="name@example.com" style="height:2.625rem; font-size:0.875rem;" />
      </div>
 
      <!-- Password field -->
      <div class="field-group" style="grid-column: span 1;">
        <label class="field-label">كلمة المرور الجديدة</label>
        <input class="field-input" type="password" name="password" required placeholder="••••••••" minlength="6" style="height:2.625rem; font-size:0.875rem;" />
      </div>
 
      <!-- Confirm Password field -->
      <div class="field-group" style="grid-column: span 1;">
        <label class="field-label">تأكيد كلمة المرور</label>
        <input class="field-input" type="password" name="confirmPassword" required placeholder="••••••••"
          minlength="6" style="height:2.625rem; font-size:0.875rem;" />
      </div>
 
      <p class="field-error hidden" id="setupError" style="grid-column: span 2; margin: 0; font-size: 0.8125rem;"></p>
 
      <button type="submit" class="btn-primary" id="setupBtn" style="grid-column: span 2; margin-top: 0.5rem; height: 3rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span id="setupLabel">حفظ وإكمال الإعداد</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>الملكية للاستثمار <span class="num" id="year"></span> ©</p>
    </div>
  </div>

  <script type="module" src="../assets/js/admin/setup.js"></script>
</body>

</html>
