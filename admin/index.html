<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.cloudinary.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/i18n.js" />
  <link rel="modulepreload" href="../assets/js/ui.js?v=2" />
  <title>لوحة الإدارة</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>
  <div id="sidebar"></div>

  <main class="dashboard-main home-main">

    <section class="home-hero">

      <!-- Content -->
      <div class="home-hero-content">

        <p class="home-eyebrow" data-i18n="dashboard.overview"></p>

        <!-- Welcome heading: label + name inline -->
        <h1 class="home-heading">
          <span class="home-welcome-line">
            <span data-i18n="dashboard.welcomeBack"></span>&nbsp;<span class="home-name" id="welcomeName"
              aria-live="polite"></span>
          </span>
        </h1>

        <p class="home-subline" data-i18n="dashboard.dashOverview"></p>

        <div class="home-shortcuts" id="homeShortcuts">

          <a href="databases.html" class="home-shortcut-btn" id="shortcutDb">
            <span class="hsc-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3" />
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
              </svg>
            </span>
            <span class="hsc-body">
              <span class="hsc-label" data-i18n="dashboard.goToDatabase">قاعدة البيانات</span>
              <span class="hsc-desc">استعرض وابحث في كامل سجلات العقارات المدخلة في النظام</span>
              <span class="hsc-count" id="qcTotal">—</span>
            </span>
            <span class="hsc-arrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </span>
          </a>

          <a href="properties.html" class="home-shortcut-btn" id="shortcutProps">
            <span class="hsc-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
            </span>
            <span class="hsc-body">
              <span class="hsc-label" data-i18n="dashboard.goToProperties">العقارات</span>
              <span class="hsc-desc">تصفح الوحدات المتاحة وتفاصيلها ومواصفاتها الكاملة</span>
              <span class="hsc-count" id="qcAvailable">—</span>
            </span>
            <span class="hsc-arrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </span>
          </a>

          <a href="map.html" class="home-shortcut-btn" id="shortcutMap">
            <span class="hsc-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
                <line x1="8" y1="2" x2="8" y2="18" />
                <line x1="16" y1="6" x2="16" y2="22" />
              </svg>
            </span>
            <span class="hsc-body">
              <span class="hsc-label" data-i18n="dashboard.goToMap">الخريطة</span>
              <span class="hsc-desc">شاهد مواقع العقارات جغرافياً على خريطة تفاعلية</span>
              <span class="hsc-count" id="qcMap">—</span>
            </span>
            <span class="hsc-arrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </span>
          </a>

        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script type="module" src="../assets/js/admin/index.js"></script>
</body>

</html>
