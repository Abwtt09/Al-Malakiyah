<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="dns-prefetch" href="https://api.cloudinary.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="modulepreload" href="../assets/js/auth.js" />
    <link rel="modulepreload" href="../assets/js/i18n.js" />
    <link rel="modulepreload" href="../assets/js/ui.js?v=2" />
    <title>تسجيل الدخول · Almalakiyah Real Estate</title>
    <meta name="robots" content="noindex,nofollow" />
    <link class="favicon" rel="icon" href="../assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
  </head>
  <body class="auth-page">
    <!-- Background glowing elements -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="auth-card">
      <a href="/admin/index.html" class="logo">
        <img src="../assets/img/logo.png" alt="" class="logo-mark">
        <div class="logo-text">
          <span class="logo-name">الملكية للإستثمار</span>
        </div>
      </a>

      <div class="auth-header">
        <h1 data-i18n="login.title">تسجيل الدخول</h1>
        <p data-i18n="login.description">أدخل تفاصيل حسابك للوصول إلى لوحة التحكم</p>
      </div>

      <form id="loginForm">
        <div class="field-group">
          <label class="field-label" data-i18n="login.email">اسم المستخدم</label>
          <input
            class="field-input"
            type="text"
            name="username"
            autocomplete="username"
            required
            dir="ltr"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            data-i18n-placeholder="login.emailPlaceholder"
            placeholder="اسم المستخدم أو البريد الإلكتروني"
          />
        </div>
        <div class="field-group">
          <label class="field-label" data-i18n="login.password">كلمة المرور</label>
          <input
            class="field-input"
            type="password"
            name="password"
            autocomplete="current-password"
            required
            placeholder="••••••••"
          />
        </div>
        <p class="field-error hidden" id="loginError"></p>
        <button type="submit" class="btn-primary" id="signinBtn" style="margin-top: 1.5rem;">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <span id="signinLabel" data-i18n="login.continue">دخول</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>الملكية للاستثمار <span class="num"></span> ©</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="../assets/js/animations.js"></script>
    <script type="module" src="../assets/js/admin/login.js"></script>
</body>
</html>
