<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="dns-prefetch" href="https://api.cloudinary.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/supabase-config.js" />
  <link rel="modulepreload" href="../assets/js/i18n.js" />
  <link rel="modulepreload" href="../assets/js/ui.js?v=2" />
  <title>الرسائل</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>
  <div id="sidebar"></div>

  <main class="dashboard-main">
    <header class="dashboard-header dashboard-header-split">
      <div>
        <p class="eyebrow" data-i18n="dashboard.messagesEyebrow"></p>
        <h1 data-i18n="dashboard.messagesTitle"></h1>
        <p data-i18n="dashboard.messagesDescription"></p>
      </div>
      <button class="btn btn-primary" id="composeBtn" data-i18n="dashboard.newMessage"></button>
    </header>

    <div class="filter-pills mb-5" id="msgTabs" style="
          display: inline-flex;
          background: white;
          padding: 0.25rem;
          border-radius: 999px;
          box-shadow: var(--shadow-soft);
        ">
      <button data-tab="inbox" class="active" data-i18n="dashboard.tabInbox"></button>
      <button data-tab="sent" data-i18n="dashboard.tabSent"></button>
    </div>

    <div id="messagesArea">
      <div class="loading-state"><span class="spinner"></span></div>
    </div>
  </main>

  <!-- Compose modal -->
  <div id="composeModal" class="modal-backdrop hidden">
    <div class="modal" style="max-width: 38rem">
      <button class="modal-close" id="closeCompose" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <h3 data-i18n="dashboard.composeTitle"></h3>

      <form id="composeForm" style="display: flex; flex-direction: column; gap: 1.25rem">
        <div class="field-group">
          <label class="field-label" data-i18n="dashboard.composeSubject"></label>
          <input class="field-input" name="subject" required maxlength="200" />
        </div>

        <div class="field-group">
          <label class="field-label" data-i18n="dashboard.composeRecipients"></label>
          <label class="checkbox-row">
            <input type="checkbox" id="toAll" />
            <span data-i18n="dashboard.composeAll"></span>
          </label>
          <div id="recipientPicker" class="chip-list" style="
                margin-top: 0.75rem;
                max-height: 14rem;
                overflow-y: auto;
                border: 1px solid var(--ink-100);
                border-radius: 0.75rem;
                padding: 0.75rem;
              "></div>
        </div>

        <div class="field-group">
          <label class="field-label" data-i18n="dashboard.composeBody"></label>
          <textarea class="field-textarea" name="body" rows="6" required></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" data-i18n="dashboard.composeChannels"></label>
          <label class="checkbox-row"><input type="checkbox" name="chEmail" />
            <span data-i18n="dashboard.composeChannelEmail"></span></label>
          <label class="checkbox-row"><input type="checkbox" name="chSms" />
            <span data-i18n="dashboard.composeChannelSms"></span></label>
          <span class="field-hint" data-i18n="dashboard.composeChannelHint"></span>
        </div>

        <p class="field-error hidden" id="composeError"></p>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelCompose" data-i18n="dashboard.cancel"></button>
          <button type="submit" class="btn btn-primary" id="sendBtn">
            <span id="sendLabel" data-i18n="dashboard.composeSend"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script type="module" src="../assets/js/admin/messages.js"></script>
</body>

</html>
