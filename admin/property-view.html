<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/i18n.js" />
  <link rel="modulepreload" href="../assets/js/ui.js?v=2" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <title>تفاصيل العقار</title>
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  
  <link rel="stylesheet" href="../assets/css/admin.css" />
  
</head>

<body>
  <div id="sidebar"></div>

  <main class="dashboard-main">
    <!-- Loading -->
    <div id="pvLoading" class="loading-state" style="padding: 3rem 0">
      <span class="spinner"></span>
    </div>

    <!-- Error / not found -->
    <div id="pvError" class="hidden" style="padding: 3rem 0; text-align: center">
      <p style="color: var(--ink-500); font-size: 0.9375rem">
        العقار غير موجود أو تم حذفه.
      </p>
      <a href="properties.html" class="btn btn-ghost" style="margin-top: 1rem">العودة للعقارات</a>
    </div>

    <!-- Content -->
    <div id="pvContent" class="hidden">
      <!-- Header -->
      <div class="pv-header">
        <div>
          <a href="properties.html" class="pv-back">← العقارات</a>
          <h1 id="pvTitle">—</h1>
          <div class="pv-status-row" id="pvBadges"></div>
        </div>
        <div class="pv-header-actions" style="display:flex;gap:0.75rem;align-items:center;">
          <button id="pvPdfBtn" class="btn btn-outline" style="display:inline-flex;align-items:center;gap:0.5rem;background:rgba(198,162,79,0.05);color:var(--gold);border:1px solid rgba(198,162,79,0.25);font-size:0.875rem;font-weight:600;padding:0.6rem 1.1rem;border-radius:0.5rem;cursor:pointer;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            مشاركة
          </button>
          <button id="pvApproveBtn" class="btn btn-success hidden" data-role-require="properties.approve" style="display:inline-flex;align-items:center;gap:0.5rem;background:#10b981;color:#fff;border:none;font-size:0.875rem;font-weight:600;padding:0.6rem 1.1rem;border-radius:0.5rem;cursor:pointer;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            اعتماد
          </button>
          <a id="pvEditBtn" href="#" class="btn btn-primary" data-role-require="properties.edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            تعديل
          </a>
        </div>
      </div>

      <!-- Product Hero Section (Gallery + Purchase Info Sidebar) -->
      <div class="pv-product-hero">
        <!-- Right: Gallery -->
        <div class="pv-product-gallery">
          <div class="pv-gallery-main" id="pvGalleryMain">
            <div class="pv-no-img">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              <span>لا توجد صور</span>
            </div>
          </div>
          <div class="pv-thumbs" id="pvThumbs"></div>
        </div>

        <!-- Left: Purchase Info & Miniature Map Sidebar -->
        <div class="pv-product-sidebar">
          <!-- Price & Area Card -->
          <div class="pv-card pv-price-area-card" style="display: flex; justify-content: space-between; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
            <div id="pvPriceEl" style="margin:0; display:flex; flex-direction:column; gap:0.25rem;"></div>
            <div id="pvAreaCardSlot" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.25rem;">
              <span style="font-size: 0.7rem; color: var(--ink-500); font-weight: 700; text-transform: uppercase;">المساحة</span>
              <span id="pvAreaVal" style="font-size: 1.5rem; font-weight: 700; color: var(--ink-900);">—</span>
            </div>
            <!-- Hidden specs fallback -->
            <div class="pv-specs" id="pvSpecs" style="display: none;"></div>
          </div>

          <!-- Location -->
          <div class="pv-card hidden" id="pvLocCard">
            <p class="pv-card-ttl">الموقع</p>
            <div class="pv-loc">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <span id="pvLocation"></span>
            </div>
          </div>

          <!-- Map with boundary -->
          <div class="pv-card hidden" id="pvMapCard" style="padding: 1.25rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
              <p class="pv-card-ttl" style="margin:0; border:none; padding:0;">خريطة وحدود العقار</p>
              <a id="pvPlatformMapBtn" href="#" class="btn btn-outline" style="font-size:0.75rem; padding:0.35rem 0.75rem; border-radius:0.375rem; display:inline-flex; align-items:center; gap:0.25rem; background:rgba(198,162,79,0.05); color:var(--gold); border:1px solid rgba(198,162,79,0.25);">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                  <line x1="8" y1="2" x2="8" y2="18"/>
                  <line x1="16" y1="6" x2="16" y2="22"/>
                </svg>
                خريطة المنصة
              </a>
            </div>
            <div class="pv-map-wrap" id="pvMap" style="height: 180px;"></div>
          </div>
        </div>
      </div>

      <!-- Product Details Section (Descriptions, Notes) -->
      <div class="pv-product-details">
        <div class="pv-card" id="pvDescCard">
          <p class="pv-card-ttl">الوصف التفصيلي</p>
          <p class="pv-desc" id="pvDesc"></p>
        </div>
        <div class="pv-card hidden" id="pvNotesCard">
          <p class="pv-card-ttl">ملاحظات هامة</p>
          <p class="pv-desc" id="pvNotes" style="white-space: pre-wrap;"></p>
        </div>
        <div class="pv-card hidden" id="pvTagsCard">
          <p class="pv-card-ttl">الوسوم</p>
          <div class="pv-tags" id="pvTags"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script type="module" src="../assets/js/admin/property-view.js"></script>
</body>

</html>
