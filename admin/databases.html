<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="modulepreload" href="../assets/js/auth.js" />
  <link rel="modulepreload" href="../assets/js/supabase-config.js" />
  <link rel="modulepreload" href="../assets/js/i18n.js" />
  <link rel="modulepreload" href="../assets/js/ui.js?v=2" />
  <title>قواعد البيانات · Almalakiyah Real Estate</title>
  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>
  <div id="sidebar"></div>

  <main class="dashboard-main">
    <header class="dashboard-header">
      <div class="dashboard-header-split">
        <div>
          <p class="eyebrow" data-i18n="db.eyebrow"></p>
          <h1 data-i18n="db.title"></h1>
          <p data-i18n="db.description"></p>
        </div>
        <button class="btn btn-primary" id="createDbBtn" data-role-require="db.create">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span data-i18n="db.createBtn"></span>
        </button>
      </div>
    </header>

    <!-- Skeleton loading -->
    <div id="dbLoading" class="db-skeleton-grid">
      <div class="db-skeleton-card">
        <div class="skeleton-line" style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"></div>
        <div class="skeleton-line" style="height: 1rem; margin-top: 0.5rem"></div>
        <div class="skeleton-line" style="height: 0.75rem; width: 70%; margin-top: 0.375rem"></div>
      </div>
      <div class="db-skeleton-card">
        <div class="skeleton-line" style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"></div>
        <div class="skeleton-line" style="height: 1rem; margin-top: 0.5rem"></div>
        <div class="skeleton-line" style="height: 0.75rem; width: 55%; margin-top: 0.375rem"></div>
      </div>
      <div class="db-skeleton-card">
        <div class="skeleton-line" style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"></div>
        <div class="skeleton-line" style="height: 1rem; margin-top: 0.5rem"></div>
        <div class="skeleton-line" style="height: 0.75rem; width: 80%; margin-top: 0.375rem"></div>
      </div>
    </div>

    <!-- Database cards grid -->
    <div id="dbGrid" class="db-grid" style="display: none"></div>

    <!-- Empty state -->
    <div id="dbEmpty" class="db-empty" style="display: none">
      <div class="db-empty-icon" id="dbEmptyIcon"></div>
      <h3 data-i18n="db.emptyTitle"></h3>
      <p data-i18n="db.emptyHint"></p>
      <button class="btn btn-primary" id="createDbEmptyBtn" data-role-require="db.create">
        <span data-i18n="db.createFirst"></span>
      </button>
    </div>
  </main>

  <!-- Create / Edit Database Modal -->
  <div id="dbModal" class="modal-backdrop hidden">
    <div class="modal" style="max-width: 32rem">
      <button class="modal-close" id="dbModalClose" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <h3 id="dbModalTitle"></h3>
      <form id="dbForm" style="
            margin-top: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
          ">
        <div class="field-group">
          <label class="field-label" data-i18n="db.iconLabel"></label>
          <div class="db-icon-picker" id="dbIconPicker"></div>
          <input type="hidden" id="dbIconValue" name="icon" value="database" />
        </div>
        <div class="field-group">
          <label class="field-label" data-i18n="db.nameLabel"></label>
          <input class="field-input" type="text" name="name" id="dbNameInput" required
            data-i18n-placeholder="db.namePlaceholder" />
        </div>
        <div class="field-group">
          <label class="field-label" data-i18n="db.descLabel"></label>
          <textarea class="field-input" name="description" id="dbDescInput" rows="2"
            data-i18n-placeholder="db.descPlaceholder" style="resize: vertical"></textarea>
        </div>
        <div class="field-group">
          <label class="field-label" data-i18n="db.categoryLabel"></label>
          <input class="field-input" type="text" name="category" id="dbCategoryInput"
            data-i18n-placeholder="db.categoryPlaceholder" />
        </div>
        <p class="field-error hidden" id="dbFormError"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="dbModalCancel" data-i18n="dashboard.cancel"></button>
          <button type="submit" class="btn btn-primary" id="dbSaveBtn">
            <span class="spinner hidden" id="dbSaveSpinner"
              style="width: 0.9rem; height: 0.9rem; border-width: 2px"></span>
            <span id="dbSaveLabel" data-i18n="db.saveDb"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="dbDeleteModal" class="modal-backdrop hidden">
    <div class="modal" style="max-width: 28rem">
      <button class="modal-close" id="dbDeleteModalClose" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <h3 id="dbDeleteName" style="margin-bottom: 0.75rem"></h3>
      <p style="font-size: 0.9375rem; color: var(--ink-600)" data-i18n="db.deleteConfirmMsg"></p>
      <p class="field-error hidden" id="dbDeleteError" style="margin-top: 0.75rem"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="dbDeleteCancel" data-i18n="dashboard.cancel"></button>
        <button class="btn btn-danger" id="dbDeleteConfirmBtn">
          <span class="spinner hidden" id="dbDeleteSpinner"
            style="width: 0.9rem; height: 0.9rem; border-width: 2px"></span>
          <span id="dbDeleteLabel" data-i18n="db.deleteDb"></span>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script type="module" src="../assets/js/admin/databases.js"></script>
</body>

</html>
