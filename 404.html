<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@200;300;400;500;600;700&family=Inter:wght@200;300;400;500&display=swap" />
  
  <title>الصفحة غير موجودة | Al-Malakiyah</title>
  <link rel="icon" href="/assets/img/favicon.png" type="image/png" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cream': '#F6F5F2',
            'charcoal': '#0B0B0B',
            'charcoal-light': '#141414',
            'gold': '#C6A24F',
            'text-muted': 'rgba(247, 247, 247, 0.6)'
          },
          fontFamily: {
            'ar': ['"IBM Plex Sans Arabic"', 'sans-serif'],
            'en': ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="section-dark">

  <!-- Luxury Cursor -->
  <div class="luxury-cursor"></div>

  <!-- Page Transition Layer -->
  <div class="page-transition fixed inset-0 bg-[#0B0B0B] z-[100] translate-y-[100%]"></div>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay text-white">
    <div class="absolute top-8 left-8">
      <button class="menu-toggle flex flex-col gap-[6px] w-10 h-10 justify-center items-center relative z-50">
        <span class="w-8 h-[1px] bg-white absolute rotate-45"></span>
        <span class="w-8 h-[1px] bg-white absolute -rotate-45"></span>
      </button>
    </div>
    <nav class="flex flex-col text-center font-ar font-light space-y-6 text-3xl">
      <a href="index.html" class="menu-link hover:text-gold transition-colors">الرئيسية</a>
      <a href="about.html" class="menu-link hover:text-gold transition-colors">عن الملكية</a>
      <a href="projects.html" class="menu-link hover:text-gold transition-colors">المشاريع</a>
      <a href="properties.html" class="menu-link hover:text-gold transition-colors">العقارات</a>
      <a href="contact.html" class="menu-link hover:text-gold transition-colors">اتصل بنا</a>
    </nav>
  </div>

  <!-- Floating Glass Header -->
  <header class="glass-header fixed top-0 left-0 right-0 z-40 py-6 transition-all duration-300 border-none bg-transparent">
    <div class="max-w-[1800px] mx-auto px-6 md:px-12 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-4 group magnetic-wrap">
        <span class="font-en text-sm font-bold tracking-[0.2em] uppercase text-white transition-colors duration-300 logo-text">Al-Malakiyah</span>
      </a>
      
      <nav class="hidden md:flex items-center gap-12 text-xs font-en tracking-[0.15em] uppercase text-white/80">
        <a href="about.html" class="hover:text-gold transition-colors">About</a>
        <a href="projects.html" class="hover:text-gold transition-colors">Projects</a>
        <a href="properties.html" class="hover:text-gold transition-colors">Properties</a>
        <a href="contact.html" class="hover:text-gold transition-colors">Contact</a>
      </nav>

      <div class="flex items-center gap-8">
        <button class="hidden md:block text-xs font-en tracking-widest hover:text-gold transition-colors magnetic-wrap text-white">عربي</button>
        <button class="menu-toggle md:hidden flex flex-col justify-center items-center gap-[6px] w-10 h-10 z-50 text-white">
          <span class="w-8 h-[1px] bg-current"></span>
          <span class="w-8 h-[1px] bg-current"></span>
        </button>
      </div>
    </div>
  </header>

  <section class="h-screen w-full flex flex-col items-center justify-center relative z-10 px-6">
    <!-- Subtle Background Elements -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none flex items-center justify-center">
      <div class="w-[800px] h-[800px] border border-white/5 rounded-full absolute"></div>
      <div class="w-[600px] h-[600px] border border-white/5 rounded-full absolute"></div>
      <div class="w-[400px] h-[400px] border border-white/10 rounded-full absolute"></div>
    </div>

    <div class="relative z-10 text-center">
      <div class="text-mask mb-4">
        <h1 class="split-text font-en text-[15vw] md:text-[12vw] font-light text-white leading-none">
          4<span class="text-gold italic">0</span>4
        </h1>
      </div>
      <div class="text-mask mb-12">
        <p class="split-text-lines text-xl font-light font-ar text-white/50 tracking-wide">
          المساحة التي تبحث عنها غير موجودة.
        </p>
      </div>
      <div class="magnetic-wrap">
        <a href="index.html" class="inline-flex items-center gap-4 text-xs font-en uppercase tracking-[0.2em] text-white border-b border-white/30 pb-2 hover:border-gold hover:text-gold transition-colors">
          Return Home
        </a>
      </div>
    </div>
  </section>

  <!-- External Libraries -->
  <script src="https://unpkg.com/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/split-type"></script>
  <script src="/assets/js/main.js"></script>

</html>
